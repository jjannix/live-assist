<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Break · jnk Live Assist</title>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/broadcast.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1/build/qrcode.min.js"></script>
    <style>
        /*
         * ════════════════════════════════════════════════════════════════
         *  jnk Live Assist · Break screen (slide deck)
         *  Audience-facing halftime graphic for OBS Browser Source @ 1080p.
         *
         *  Atmosphere + type + motion live in broadcast.css (shared with
         *  any future match-day view). This file holds the SLIDE DECK:
         *  six compositions that crossfade on a rotation timer, all
         *  reading from the same break-state (so a goal or message lands
         *  on whatever slide is showing). The operator can pin one slide,
         *  toggle slides off, or set the dwell.
         *
         *  Deck:
         *    1. clock   — numeral hero countdown
         *    2. radial  — countdown as a depleting ring
         *    3. score   — editorial scoreboard split
         *    4. message — full-screen pushed text
         *    5. ad      — single sponsor (logo + name + tagline + QR)
         *    6. brand   — pure attract motion (the breather)
         * ════════════════════════════════════════════════════════════════
         */

        .stage {
            position: relative; z-index: 3;
            display: grid; grid-template-rows: auto 1fr auto;
            width: 100%; height: 100%;
            padding: clamp(40px, 5vw, 88px) clamp(48px, 6vw, 110px);
        }

        /* Persistent top bar + lower-third sit outside the deck so they
           stay anchored while slides crossfade between them. */
        .top {
            display: flex; justify-content: space-between; align-items: center;
        }
        .brand {
            display: flex; align-items: center; gap: 14px;
            font-size: clamp(13px, 1.1vw, 17px); font-weight: 700;
            letter-spacing: 3px; text-transform: uppercase; color: var(--ink-2);
        }
        .brand .mark {
            position: relative;
            width: 11px; height: 11px; border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 18px var(--accent-glow), 0 0 4px var(--accent);
            animation: breathe 2.6s ease-in-out infinite;
        }
        .brand .mark::after {
            content: ''; position: absolute; inset: -6px; border-radius: 50%;
            border: 1px solid var(--accent-glow);
            animation: ring 2.6s ease-out infinite;
        }
        .wallclock {
            font-size: clamp(14px, 1.1vw, 18px); font-weight: 600;
            color: var(--ink-2); font-variant-numeric: tabular-nums;
            letter-spacing: 1px;
        }

        /* The deck fills the middle row. Each slide centres its content. */
        .deck-wrap { position: relative; min-height: 0; }
        .slide {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center; gap: clamp(16px, 2vw, 32px);
            padding: 24px 0;
        }

        /* ── Shared slide pieces ── */
        .title {
            font-family: var(--font-display);
            font-size: clamp(44px, 5.5vw, 84px);
            font-weight: 700; letter-spacing: 0.04em;
            line-height: 1; text-transform: uppercase;
            background: linear-gradient(180deg, var(--ink-0) 0%, var(--ink-1) 100%);
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .caption {
            font-size: clamp(15px, 1.4vw, 22px);
            font-weight: 600; letter-spacing: 0.4em; text-transform: uppercase;
            color: var(--ink-2);
        }
        .caption.done { color: var(--warm); }

        /* ── Slide: clock ── */
        .clock {
            font-family: var(--font-display);
            font-size: clamp(140px, 19vw, 300px);
            font-weight: 700; letter-spacing: -0.04em; line-height: 0.9;
            font-variant-numeric: tabular-nums; color: var(--ink-0);
            text-shadow: 0 0 60px rgba(124, 106, 255, 0.12);
            transition: color 0.6s ease, text-shadow 0.6s ease;
        }
        .clock.done {
            color: var(--warm);
            text-shadow: 0 0 80px var(--warm-glow);
            animation: done-pulse 1.8s ease-in-out infinite;
        }
        @keyframes done-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.78; } }
        .message-inline {
            font-size: clamp(20px, 2.2vw, 34px);
            font-weight: 400; font-style: italic; color: var(--ink-1);
            max-width: 24ch; line-height: 1.3; min-height: 1em;
        }

        /* ── Slide: radial ── */
        .radial-wrap { position: relative; width: clamp(260px, 32vw, 460px); aspect-ratio: 1; }
        .radial-wrap svg { width: 100%; height: 100%; transform: rotate(-90deg); }
        .radial-bg { fill: none; stroke: var(--line); stroke-width: 10; }
        .radial-fg {
            fill: none; stroke: var(--accent); stroke-width: 10; stroke-linecap: round;
            transition: stroke-dashoffset 0.9s linear, stroke 0.6s ease;
            filter: drop-shadow(0 0 12px var(--accent-glow));
        }
        .radial-fg.done { stroke: var(--warm); filter: drop-shadow(0 0 16px var(--warm-glow)); }
        .radial-center {
            position: absolute; inset: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
        }
        .radial-num {
            font-family: var(--font-display);
            font-size: clamp(56px, 7vw, 110px); font-weight: 700;
            letter-spacing: -0.03em; line-height: 1;
            font-variant-numeric: tabular-nums; color: var(--ink-0);
        }
        .radial-num.done { color: var(--warm); }

        /* ── Slide: score (editorial split) ── */
        .scoreboard { display: flex; flex-direction: column; align-items: center; gap: 28px; width: 100%; }
        .score-eyebrow {
            font-size: clamp(13px, 1.1vw, 17px); font-weight: 700;
            letter-spacing: 0.4em; text-transform: uppercase; color: var(--ink-2);
        }
        .score-row {
            display: flex; align-items: center; gap: clamp(28px, 4vw, 64px);
            font-family: var(--font-display);
        }
        .score-side { display: flex; flex-direction: column; align-items: center; gap: 12px; min-width: 0; }
        .score-side .team {
            font-size: clamp(20px, 2vw, 32px); font-weight: 600;
            color: var(--ink-1); text-transform: uppercase; letter-spacing: 0.05em;
            max-width: 8em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .score-side .num {
            font-size: clamp(72px, 9vw, 140px); font-weight: 700;
            color: var(--ink-0); font-variant-numeric: tabular-nums; line-height: 1;
        }
        .score-side .num.pulse { animation: num-pulse 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes num-pulse {
            0%   { transform: scale(1);    color: var(--ink-0); }
            35%  { transform: scale(1.2);  color: var(--accent); }
            100% { transform: scale(1);    color: var(--ink-0); }
        }
        .score-colon { font-size: clamp(48px, 6vw, 96px); font-weight: 500; color: var(--ink-3); }

        /* ── Slide: message (full-screen type) ── */
        .msg-hero {
            font-family: var(--font-display);
            font-size: clamp(48px, 6.5vw, 104px);
            font-weight: 700; line-height: 1.05; letter-spacing: -0.01em;
            max-width: 18ch; color: var(--ink-0);
        }
        .msg-eyebrow {
            font-size: clamp(13px, 1.1vw, 17px); font-weight: 700;
            letter-spacing: 0.4em; text-transform: uppercase; color: var(--accent);
        }
        .msg-empty { color: var(--ink-3); font-style: italic; }

        /* ── Slide: ad (multi-sponsor broadcast bumper) ── */
        .ad-slide { padding: 0; position: relative; overflow: hidden; }
        /* Diagonal light sweep across the slide — slow, ambient motion. */
        .ad-sweep {
            position: absolute; inset: -20% -20%;
            background: linear-gradient(115deg,
                transparent 30%,
                rgba(124,106,255,0.10) 45%,
                rgba(255,255,255,0.05) 50%,
                rgba(124,106,255,0.10) 55%,
                transparent 70%);
            transform: translateX(-40%);
            animation: ad-sweep 9s cubic-bezier(0.4, 0, 0.6, 1) infinite;
            pointer-events: none; z-index: 1;
        }
        @keyframes ad-sweep {
            0%   { transform: translateX(-40%); }
            100% { transform: translateX(40%); }
        }
        /* Subtle radial vignette so the logo has a quiet frame. */
        .ad-vignette {
            position: absolute; inset: 0; z-index: 1; pointer-events: none;
            background: radial-gradient(ellipse 70% 60% at 50% 45%, transparent 30%, rgba(7,7,12,0.45) 100%);
        }
        .ad-stage { position: absolute; inset: 0; z-index: 2; }
        .ad-panel {
            position: absolute; inset: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 14px; padding: 60px;
            opacity: 0;
            transition: opacity 0.9s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .ad-panel.active { opacity: 1; }
        .ad-panel.active .ad-eyebrow,
        .ad-panel.active .ad-name,
        .ad-panel.active .ad-tag,
        .ad-panel.active .ad-logo-box { animation: ad-rise 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
        .ad-panel.active .ad-eyebrow { animation-delay: 0.05s; }
        .ad-panel.active .ad-logo-box { animation-delay: 0.15s; }
        .ad-panel.active .ad-name    { animation-delay: 0.25s; }
        .ad-panel.active .ad-tag     { animation-delay: 0.35s; }
        @keyframes ad-rise {
            from { opacity: 0; transform: translateY(18px); }
            to   { opacity: 1; transform: none; }
        }
        .ad-eyebrow {
            font-size: 13px; font-weight: 700;
            letter-spacing: 0.45em; text-transform: uppercase; color: var(--ink-3);
            position: relative; padding-bottom: 10px;
        }
        .ad-eyebrow::after {
            content: ''; position: absolute; left: 50%; bottom: 0;
            transform: translateX(-50%);
            width: 36px; height: 1px; background: var(--accent);
        }
        .ad-logo-box {
            height: clamp(140px, 22vh, 240px);
            display: flex; align-items: center; justify-content: center;
        }
        .ad-logo-box img {
            max-height: 100%; max-width: 56vw; object-fit: contain;
            filter: drop-shadow(0 0 28px rgba(255,255,255,0.10));
            animation: ad-breathe 4.5s ease-in-out infinite;
        }
        @keyframes ad-breathe {
            0%, 100% { transform: scale(1); }
            50%      { transform: scale(1.025); }
        }
        .ad-name {
            font-family: var(--font-display);
            font-size: clamp(34px, 4.2vw, 64px); font-weight: 700;
            color: var(--ink-0); text-align: center; line-height: 1.05;
            letter-spacing: 0.005em;
        }
        .ad-tag {
            font-size: clamp(15px, 1.3vw, 20px); font-weight: 400;
            color: var(--ink-1); text-align: center;
            max-width: 38ch; line-height: 1.4; font-style: italic;
        }
        .ad-counter {
            position: absolute; bottom: 32px; left: 50%;
            transform: translateX(-50%); z-index: 3;
            font-size: 11px; font-weight: 700; letter-spacing: 0.35em;
            color: var(--ink-3); text-transform: uppercase;
            font-variant-numeric: tabular-nums;
        }
        .ad-qr {
            position: absolute !important; bottom: 28px; right: 28px; z-index: 3;
            width: 90px !important; height: 90px !important;
            border-radius: 10px; background: #fff; padding: 6px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.4);
        }

        /* ── Slide: flowfield (generative particle art) ── */
        .slide-canvas { padding: 0; }
        .flow-canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; }
        .flow-overlay {
            position: relative; z-index: 2;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            mix-blend-mode: screen;
        }

        /* ── Slide: brand (attract) ── */
        .brand-hero { display: flex; flex-direction: column; align-items: center; gap: 28px; }
        .brand-glyph {
            position: relative; width: clamp(120px, 14vw, 200px); aspect-ratio: 1;
            border-radius: 50%;
            border: 2px solid var(--line-2);
            display: flex; align-items: center; justify-content: center;
        }
        .brand-glyph::before {
            content: ''; position: absolute; inset: -2px; border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: var(--accent); border-right-color: var(--accent-2);
            animation: spin 6s linear infinite;
        }
        .brand-glyph .core {
            width: 40%; height: 40%; border-radius: 50%;
            background: var(--accent); box-shadow: 0 0 40px var(--accent-glow);
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .brand-word {
            font-family: var(--font-display);
            font-size: clamp(40px, 5vw, 80px); font-weight: 700;
            letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-0);
        }
        .brand-sub {
            font-size: clamp(14px, 1.2vw, 18px); font-weight: 600;
            letter-spacing: 0.4em; text-transform: uppercase; color: var(--ink-2);
        }

        /* ── Lower-third data strip ── */
        .lower {
            position: relative;
            display: flex; align-items: stretch;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 16px;
            overflow: hidden;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }
        .lower::before {
            content: ''; position: absolute; left: 0; right: 0; top: 0; height: 2px;
            background: linear-gradient(90deg,
                transparent 0%, var(--accent) 20%, var(--accent-2) 50%, var(--accent) 80%, transparent 100%);
            opacity: 0.7;
        }
        .seg { display: flex; align-items: center; gap: 16px; padding: clamp(18px, 1.8vw, 28px) clamp(22px, 2.2vw, 36px); }
        .seg + .seg { border-left: 1px solid var(--line); }
        .seg-label { font-size: clamp(10px, 0.8vw, 12px); font-weight: 700; letter-spacing: 0.25em; text-transform: uppercase; color: var(--ink-2); }
        .seg-val { font-family: var(--font-display); font-size: clamp(22px, 2.2vw, 34px); font-weight: 600; color: var(--ink-0); font-variant-numeric: tabular-nums; line-height: 1; }
        .live { margin-left: auto; display: flex; align-items: center; gap: 10px; font-size: clamp(11px, 0.9vw, 14px); font-weight: 800; letter-spacing: 0.3em; text-transform: uppercase; color: var(--warm); }
        .live .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--warm); box-shadow: 0 0 12px var(--warm-glow); animation: breathe 1.4s ease-in-out infinite; }


        /* Slide indicator (tiny dots, bottom-right) — shows which slide
           is live and how many are in the rotation. Subtle broadcast cue. */
        .indicators {
            position: fixed; right: clamp(20px, 2vw, 32px); bottom: clamp(12px, 1.4vw, 20px);
            z-index: 4; display: flex; gap: 6px; opacity: 0.5;
        }
        .indicators .pip { width: 6px; height: 6px; border-radius: 3px; background: var(--ink-3); transition: background 0.3s, width 0.3s; }
        .indicators .pip.on { background: var(--accent); width: 18px; }
    </style>
</head>
<body>
    <!-- Atmosphere (shared, from broadcast.css) -->
    <div class="atmos"></div>
    <div class="orb a"></div>
    <div class="orb b"></div>
    <div class="vignette"></div>
    <div class="grain"></div>

    <main class="stage">
        <!-- Persistent top bar -->
        <header class="top enter d1">
            <div class="brand">
                <span class="mark"></span>
                <span>jnk · Live Assist</span>
            </div>
            <div class="wallclock" id="wallclock">--:--</div>
        </header>

        <!-- Slide deck -->
        <div class="deck-wrap">
            <!-- 1. Clock -->
            <section class="slide" data-slide="clock">
                <h2 class="title" id="title">HALBZEIT</h2>
                <div class="clock" id="clock">15:00</div>
                <div class="caption" id="caption">bis Anpfiff</div>
                <div class="message-inline" id="message"></div>
            </section>

            <!-- 2. Radial -->
            <section class="slide" data-slide="radial">
                <div class="radial-wrap">
                    <svg viewBox="0 0 200 200">
                        <circle class="radial-bg" cx="100" cy="100" r="92"></circle>
                        <circle class="radial-fg" id="radialFg" cx="100" cy="100" r="92"></circle>
                    </svg>
                    <div class="radial-center">
                        <div class="radial-num" id="radialNum">15:00</div>
                        <div class="caption" id="radialCap">bis Anpfiff</div>
                    </div>
                </div>
            </section>

            <!-- 3. Score -->
            <section class="slide" data-slide="score">
                <div class="scoreboard">
                    <div class="score-eyebrow" id="scoreEyebrow">Aktueller Stand</div>
                    <div class="score-row">
                        <div class="score-side">
                            <span class="team" id="homeName"></span>
                            <span class="num" id="homeScore">0</span>
                        </div>
                        <span class="score-colon">:</span>
                        <div class="score-side">
                            <span class="num" id="awayScore">0</span>
                            <span class="team" id="awayName"></span>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 4. Message -->
            <section class="slide" data-slide="message">
                <div class="msg-eyebrow">Durchsage</div>
                <div class="msg-hero" id="msgHero">—</div>
            </section>

            <!-- 5. Ad (multi-sponsor bumper) -->
            <section class="slide ad-slide" data-slide="ad">
                <div class="ad-sweep" id="adSweep"></div>
                <div class="ad-vignette"></div>
                <div class="ad-stage" id="adStage"></div>
                <div class="ad-counter" id="adCounter" hidden></div>
                <canvas class="ad-qr" id="adQr" hidden></canvas>
            </section>

            <!-- 6. Brand (attract) -->
            <section class="slide" data-slide="brand">
                <div class="brand-hero">
                    <div class="brand-glyph"><div class="core"></div></div>
                    <div class="brand-word">jnk</div>
                    <div class="brand-sub">Live Assist</div>
                </div>
            </section>

            <!-- 7. Flowfield (generative particle art) -->
            <section class="slide slide-canvas" data-slide="flowfield">
                <canvas class="flow-canvas" id="flowCanvas"></canvas>
                <div class="flow-overlay">
                    <div class="brand-word">jnk</div>
                    <div class="brand-sub">Live Assist</div>
                </div>
            </section>

        </div>

        <!-- Persistent lower-third -->
        <footer class="lower enter d6">
            <div class="seg" id="segMatch">
                <span class="seg-label" id="matchLbl">HT</span>
                <span class="seg-val" id="matchVal">—</span>
            </div>
            <div class="seg" id="segScore">
                <span class="seg-label" id="lowerScoreLbl">Stand</span>
                <span class="seg-val" id="lowerScore">0:0</span>
            </div>
            <div class="seg" style="flex:1">
                <div class="live"><span class="dot"></span><span>Break</span></div>
            </div>
        </footer>
    </main>

    <!-- Rotation indicator -->
    <div class="indicators" id="indicators" hidden></div>

    <script>
    (() => {
        'use strict';
        const $ = s => document.querySelector(s);
        const $$ = s => document.querySelectorAll(s);
        const socket = io();

        let prev = { home: 0, away: 0 };
        let state = {};
        let lastState = null;
        let activeSlide = null;

        function pad(n) { return String(n).padStart(2, '0'); }
        function fmt(sec) {
            sec = Math.max(0, Math.floor(sec));
            const m = Math.floor(sec / 60), s = sec % 60;
            if (m >= 60) { const h = Math.floor(m / 60); return pad(h) + ':' + pad(m % 60) + ':' + pad(s); }
            return pad(m) + ':' + pad(s);
        }
        function liveRemaining(t) {
            if (!t || !t.endsAt) return t.remainingSec || 0;
            return Math.max(0, Math.round((t.endsAt - Date.now()) / 1000));
        }
        function pulse(el) { el.classList.remove('pulse'); void el.offsetWidth; el.classList.add('pulse'); }

        // ── Clock + radial rendering ──
        const RAD_R = 92, RAD_C = 2 * Math.PI * RAD_R;
        const radialFg = $('#radialFg');
        radialFg.style.strokeDasharray = RAD_C;
        radialFg.style.strokeDashoffset = 0;

        function renderClocks(remaining, running, duration) {
            const done = remaining <= 0;
            // Numeral clock
            const cEl = $('#clock');
            cEl.textContent = fmt(remaining);
            cEl.classList.toggle('done', done);
            const cap = $('#caption');
            cap.classList.toggle('done', done);
            cap.textContent = done ? 'Anpfiff' : (running ? 'bis Anpfiff' : 'pausiert');
            // Radial ring: full when remaining == duration, empty at 0
            const frac = duration > 0 ? Math.min(1, Math.max(0, remaining / duration)) : 0;
            radialFg.style.strokeDashoffset = RAD_C * (1 - frac);
            radialFg.classList.toggle('done', done);
            $('#radialNum').textContent = fmt(remaining);
            $('#radialNum').classList.toggle('done', done);
            $('#radialCap').textContent = done ? 'Anpfiff' : (running ? 'bis Anpfiff' : 'pausiert');
        }

        // ── Full state render ──
        function render(s) {
            state = s;
            // Title + message
            $('#title').textContent = (s.title || 'HALBZEIT').toUpperCase();
            const msg = s.message || '';
            const mEl = $('#message');
            mEl.textContent = msg;
            mEl.style.visibility = msg ? 'visible' : 'hidden';

            // Message slide
            const msgHero = $('#msgHero');
            if (msg) { msgHero.textContent = msg; msgHero.classList.remove('msg-empty'); }
            else { msgHero.textContent = 'Keine Durchsage'; msgHero.classList.add('msg-empty'); }

            // Match clock
            $('#matchLbl').textContent = ((s.matchClock && s.matchClock.label) || 'HT').toUpperCase();
            $('#matchVal').textContent = (s.matchClock && s.matchClock.display) || '—';

            // Score
            const h = s.home || {}, a = s.away || {};
            $('#homeName').textContent = h.name || 'Heim';
            $('#awayName').textContent = a.name || 'Gast';
            const hs = h.score != null ? h.score : 0;
            const as = a.score != null ? a.score : 0;
            if (hs !== prev.home) pulse($('#homeScore'));
            if (as !== prev.away) pulse($('#awayScore'));
            $('#homeScore').textContent = hs;
            $('#awayScore').textContent = as;
            prev.home = hs; prev.away = as;
            $('#lowerScore').textContent = hs + ':' + as;

            // Ad (multi-sponsor bumper)
            renderAd(s.ad || {});

            // Stash latest state for slide-lifecycle code
            lastState = s;

            // Clocks (clock + radial slides)
            const t = s.timer || {};
            const dur = t.durationSec || 1;
            renderClocks(liveRemaining(t), !!t.running, dur);

            // Rotation
            applyRotation(s.rotation || {});
        }

        // ── Ad (multi-sponsor broadcast bumper) ─────────────────────
        // Renders one panel per sponsor in state.ad.items, crossfading
        // between them on a per-sponsor dwell timer. The QR is drawn
        // from the active sponsor's URL (if any) and rebuilt on each
        // panel change. A 'Präsentiert von' eyebrow + diagonal light
        // sweep + breathing logo give the premium broadcast feel.
        let adTimer = null, adIndex = 0, adPanels = [], adCurrentUrl = '';
        function renderAd(ad) {
            ad = ad || {};
            const stage = $('#adStage');
            const items = Array.isArray(ad.items) ? ad.items : [];
            // Placeholder when no sponsors configured
            if (items.length === 0) {
                if (adTimer) { clearInterval(adTimer); adTimer = null; }
                adPanels = [];
                adIndex = 0;
                stage.innerHTML =
                    '<div class="ad-panel active"><div class="ad-eyebrow">Präsentiert von</div>' +
                    '<div class="ad-logo-box" style="font-family:var(--font-display);font-size:clamp(40px,5vw,72px);font-weight:700;color:var(--ink-3)">Dein Sponsor</div>' +
                    '<div class="ad-name" style="color:var(--ink-3)">Logo hier</div>' +
                    '<div class="ad-tag">In der App unter „Sponsor“ hinzufügen</div></div>';
                const qr = $('#adQr'); if (qr) qr.hidden = true;
                const cnt = $('#adCounter'); if (cnt) cnt.hidden = true;
                return;
            }
            // (Re)build panels only when the item count or filenames change
            const sig = items.map(x => (x.logoFile || '') + '|' + (x.orgName || '')).join('§');
            if (stage.dataset.sig !== sig) {
                stage.innerHTML = items.map((s, i) =>
                    '<div class="ad-panel' + (i === 0 ? ' active' : '') + '" data-idx="' + i + '">' +
                    '<div class="ad-eyebrow">Präsentiert von</div>' +
                    '<div class="ad-logo-box">' + (s.logoFile ? '<img src="/break-ads/' + s.logoFile + '?t=' + Date.now() + '" alt="" onerror="this.parentElement.innerHTML=\'<div style=\\\'font-family:var(--font-display);font-size:clamp(36px,4vw,56px);font-weight:700;color:var(--ink-3)\\\'>' + escapeHtml(s.orgName || '').replace(/'/g, '') + '</div>\'">' : '<div style="font-family:var(--font-display);font-size:clamp(36px,4vw,56px);font-weight:700;color:var(--ink-3)">' + escapeHtml(s.orgName || '') + '</div>') + '</div>' +
                    '<div class="ad-name">' + escapeHtml(s.orgName || '') + '</div>' +
                    '<div class="ad-tag">' + escapeHtml(s.tagline || '') + '</div>' +
                    '</div>'
                ).join('');
                stage.dataset.sig = sig;
                adPanels = Array.from(stage.querySelectorAll('.ad-panel'));
                adIndex = 0;
            }
            // Counter (only when more than one sponsor)
            const cnt = $('#adCounter');
            if (cnt) {
                if (items.length > 1) { cnt.hidden = false; cnt.textContent = (adIndex + 1) + ' / ' + items.length; }
                else cnt.hidden = true;
            }
            // QR from active sponsor
            const active = items[adIndex];
            const url = (active && active.url) || '';
            const qr = $('#adQr');
            if (url && window.QRCode) {
                if (url !== adCurrentUrl) {
                    adCurrentUrl = url;
                    QRCode.toCanvas(qr, url, { width: 90, margin: 1, color: { dark: '#000', light: '#fff' } }, () => {});
                }
                qr.hidden = false;
            } else {
                qr.hidden = true;
            }
        }
        function startAdCycle(dwell) {
            if (adTimer) { clearInterval(adTimer); adTimer = null; }
            if (adPanels.length <= 1) return;
            adTimer = setInterval(() => {
                if (adPanels.length === 0) return;
                adPanels[adIndex].classList.remove('active');
                adIndex = (adIndex + 1) % adPanels.length;
                adPanels[adIndex].classList.add('active');
                const cnt = $('#adCounter'); if (cnt) cnt.textContent = (adIndex + 1) + ' / ' + adPanels.length;
                // Refresh QR for the new panel
                const items = (lastState && lastState.ad && lastState.ad.items) || [];
                const active = items[adIndex] || {};
                const url = active.url || '';
                const qr = $('#adQr');
                if (url && window.QRCode && url !== adCurrentUrl) {
                    adCurrentUrl = url;
                    QRCode.toCanvas(qr, url, { width: 90, margin: 1, color: { dark: '#000', light: '#fff' } }, () => {});
                } else if (!url) {
                    qr.hidden = true;
                }
            }, dwell || 8000);
        }
        function stopAdCycle() { if (adTimer) { clearInterval(adTimer); adTimer = null; } }

        // ── Rotation engine ──
        let rotTimer = null;
        let activeList = [];
        let rotIndex = 0;

        function applyRotation(r) {
            const slides = r.slides || ['clock'];
            const active = r.active || {};
            const newList = slides.filter(k => active[k]);
            // If the active set changed under us, snap back to slide 0
            const same = newList.length === activeList.length && newList.every((k, i) => k === activeList[i]);
            if (!same) { activeList = newList; rotIndex = 0; }
            // Empty rotation → fall back to clock so the screen is never blank
            if (activeList.length === 0) activeList = ['clock'];

            // Build the indicator pips
            const ind = $('#indicators');
            ind.innerHTML = '';
            activeList.forEach((k, i) => {
                const pip = document.createElement('div');
                pip.className = 'pip' + (i === rotIndex ? ' on' : '');
                ind.appendChild(pip);
            });
            ind.hidden = activeList.length < 2;

            // Pinning overrides rotation
            const pinned = r.pinned;
            if (pinned && activeList.includes(pinned)) {
                showSlide(pinned);
                clearTimeout(rotTimer); rotTimer = null;
                return;
            }
            // Make sure the current slide is visible
            showSlide(activeList[rotIndex] || 'clock');

            // Schedule the next advance
            clearTimeout(rotTimer);
            const dwell = r.dwellMs || 12000;
            if (activeList.length > 1) {
                rotTimer = setTimeout(advance, dwell);
            }
        }

        function advance() {
            if (activeList.length === 0) return;
            rotIndex = (rotIndex + 1) % activeList.length;
            showSlide(activeList[rotIndex]);
            // Refresh pips
            $$('#indicators .pip').forEach((p, i) => p.classList.toggle('on', i === rotIndex));
            const dwell = (state.rotation && state.rotation.dwellMs) || 12000;
            rotTimer = setTimeout(advance, dwell);
        }

        function showSlide(name) {
            activeSlide = name;
            $$('.slide').forEach(el => el.classList.toggle('active', el.dataset.slide === name));
            // Lifecycle: start/stop the flowfield rAF loop and the ad
            // sponsor crossfade so they only burn CPU while visible.
            if (name === 'flowfield') startFlow(); else stopFlow();
            if (name === 'ad') startAdCycle((lastState && lastState.ad && lastState.ad.dwellMs) || 8000);
            else stopAdCycle();
        }

        // ── Flowfield (generative particle art) ───────────────────
        function startFlow() {
            const cv = $('#flowCanvas');
            if (!cv) return;
            const ctx = cv.getContext('2d');
            const resize = () => { cv.width = cv.offsetWidth; cv.height = cv.offsetHeight; };
            resize();
            const N = Math.max(300, Math.min(700, Math.round(cv.width * cv.height / 4200)));
            if (!fParticles || fParticles.length !== N) {
                fParticles = Array.from({ length: N }, () => ({
                    x: Math.random() * cv.width,
                    y: Math.random() * cv.height,
                    life: Math.random() * 200,
                }));
            }
            // Trail: a semi-transparent black overlay each frame, instead
            // of clearing — old positions fade out instead of vanishing.
            const draw = () => {
                ctx.fillStyle = 'rgba(7,7,12,0.04)';
                ctx.fillRect(0, 0, cv.width, cv.height);
                const t = performance.now() / 1200;
                for (const p of fParticles) {
                    // Flow angle: layered sines for organic curls (no noise lib)
                    const ang = (Math.sin(p.x * 0.006 + t) + Math.cos(p.y * 0.006 - t * 0.8)) * Math.PI;
                    p.x += Math.cos(ang) * 1.2;
                    p.y += Math.sin(ang) * 1.2;
                    p.life++;
                    if (p.x < 0) p.x = cv.width; if (p.x > cv.width) p.x = 0;
                    if (p.y < 0) p.y = cv.height; if (p.y > cv.height) p.y = 0;
                    // Hue drifts across the field so the composition is alive
                    const hue = (p.life * 0.3 + t * 30) % 360;
                    ctx.fillStyle = 'hsla(' + (250 + (p.life * 0.5) % 80) + ',90%,65%,0.5)';
                    ctx.beginPath(); ctx.arc(p.x, p.y, 1.1, 0, Math.PI * 2); ctx.fill();
                }
                fRaf = requestAnimationFrame(draw);
            };
            stopFlow();
            fRaf = requestAnimationFrame(draw);
        }
        function stopFlow() { if (fRaf) { cancelAnimationFrame(fRaf); fRaf = null; } }

        // ── Predictions (live audience tips) ──────────────────────

        // Wall clock
        function wall() { const d = new Date(); $('#wallclock').textContent = pad(d.getHours()) + ':' + pad(d.getMinutes()); }
        wall(); setInterval(wall, 10000);
    })();
    </script>
</body>
</html>
