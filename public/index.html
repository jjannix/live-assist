<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>jnk Live Assist</title>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body data-mode="unknown">

    <!-- Header (Status Bar) -->
    <header class="topbar">
        <span class="logo">jnk Live Assist</span>
        <div class="topbar-nav">
            <button class="topbar-link" onclick="location.href='/config.html'" aria-label="Open settings" title="Settings">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            </button>
            <button class="topbar-link" onclick="location.href='/dashboard.html'" aria-label="Open health dashboard" title="Health dashboard">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
            </button>
        </div>
        <div class="status-pill">
            <span class="conn-dot" id="conn" data-s="wait"></span>
            <span class="conn-dot" id="obsConn" data-s="wait"></span>
            <span class="backend-tag" id="backendTag" data-b="unknown" title="Audio backend">…</span>
            <span class="status-txt" id="statusTxt">Connecting...</span>
            <span class="timer" id="timer">00:00</span>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main">
        
        <!-- Faders -->
        <div class="faders-wrap">
            <div class="faders">
                <div class="fader-group" id="chTv">
                    <div class="fader-header">
                        <span class="ch-name">TV Broadcast</span>
                        <div class="fader-actions">
                            <span class="ch-db" id="tvDb">0.0 dB</span>
                            <button class="mute-btn" id="tvMute" aria-label="Toggle TV mute">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
                            </button>
                        </div>
                    </div>
                    <div class="fader-bar">
                        <div class="fader-fill" id="tvFill"></div>
                        <div class="fader-zero"></div>
                        <input type="range" class="fader-input" id="tvFader" min="-60" max="12" step="0.1" value="0">
                    </div>
                    <div class="fader-presets" id="tvPresets"></div>
                </div>

                <div class="fader-group" id="chSp">
                    <div class="fader-header">
                        <span class="ch-name">Spotify</span>
                        <div class="fader-actions">
                            <span class="ch-db" id="spDb">0.0 dB</span>
                            <button class="mute-btn" id="spMute" aria-label="Toggle Spotify mute">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
                            </button>
                        </div>
                    </div>
                    <div class="fader-bar">
                        <div class="fader-fill" id="spFill"></div>
                        <div class="fader-zero"></div>
                        <input type="range" class="fader-input" id="spFader" min="-60" max="12" step="0.1" value="0">
                    </div>
                    <div class="fader-presets" id="spPresets"></div>
                </div>
            </div>
        </div>

        <!-- Hero Space: mode ring, or the live-peek card (data-preview swaps them) -->
        <div class="hero-space" id="heroSpace" data-preview="idle">
            <div class="hero-idle" id="heroIdle">
                <div class="hero-ring" id="heroRing">
                    <svg id="heroIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <circle cx="12" cy="12" r="10"></circle>
                    </svg>
                </div>
                <div class="hero-text" id="heroText">Waiting...</div>
            </div>
            <div class="hero-card" id="heroCard">
                <div class="hero-thumb">
                    <img id="previewImg" alt="Live preview">
                    <div class="hero-skeleton"></div>
                    <div class="hero-err" id="previewErr"></div>
                </div>
                <div class="hero-meta">
                    <span class="hero-meta-lbl">LIVE PEEK</span>
                    <span class="hero-meta-ts" id="previewTs">—</span>
                    <span class="hero-meta-age" id="previewAge"></span>
                    <button class="hero-meta-close" id="previewClose" type="button" aria-label="Close preview">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Quick Panels: Scenes & Presets -->
        <div class="quick-panels">
            <div class="panel">
                <span class="panel-lbl">SCENES</span>
                <div class="panel-grid">
                    <button class="chip scene-chip" data-scene="Live Übertragung">Live</button>
                    <button class="chip scene-chip" data-scene="Spotify">Spotify</button>
                    <button class="chip scene-chip" data-scene="Zen">Zen</button>
                </div>
            </div>
            <div class="panel">
                <span class="panel-lbl">PROFILES</span>
                <div class="panel-grid" id="profileGrid">
                    <button class="chip profile-chip" data-profile="game">Game</button>
                    <button class="chip profile-chip" data-profile="break">Break</button>
                    <button class="chip" id="saveProfileBtn">+ Save</button>
                </div>
            </div>
        </div>

    </main>

    <!-- Bottom Dock (Primary Mobile Interactions) -->
    <div class="dock">
        <div class="dock-utils">
            <div class="dock-util-group">
                <button class="util-btn" id="peekBtn" data-state="idle" aria-label="Peek at live feed">
                    <svg class="ic-eye" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    <svg class="ic-spin" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/></svg>
                </button>
                <button class="util-btn" id="dimBtn" aria-label="Toggle Dim Mode">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </button>
            </div>
            <span class="dock-hint">Main Actions</span>
            <button class="util-btn" id="logBtn" aria-label="Activity Log">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
                <span class="badge" id="badge" hidden>0</span>
            </button>
        </div>
        <div class="dock-actions">
            <button class="action-btn game" data-mode="game">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>
                <span>Game On</span>
            </button>
            <button class="action-btn break" data-mode="break">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
                <span>Break</span>
            </button>
        </div>
    </div>

    <!-- Toasts -->
    <div class="toast-box" id="toastBox"></div>

    <!-- Drawer -->
    <div class="drawer-bg" id="drawerBg"></div>
    <div class="drawer" id="drawer">
        <div class="drawer-grip" id="drawerGrip"><div></div></div>
        <div class="drawer-bar">
            <span class="drawer-title">Activity Log</span>
            <button class="util-btn" id="clearLog" style="border:none;background:transparent;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            </button>
        </div>
        <div class="log" id="log"></div>
    </div>

    <script>
    (() => {
        'use strict';
        const $ = s => document.querySelector(s);
        const $$ = s => document.querySelectorAll(s);
        const socket = io();
        let unread = 0, drawerOpen = false, mode = 'unknown', t0 = Date.now(), previewVisible = false;
        const haptic = ms => { if (navigator.vibrate) navigator.vibrate(ms); };

        // ── Timer
        function tick() {
            const s = Math.floor((Date.now() - t0) / 1000);
            const pad = n => String(n).padStart(2, '0');
            const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
            $('#timer').textContent = h > 0 ? `${pad(h)}:${pad(m)}:${pad(sec)}` : `${pad(m)}:${pad(sec)}`;
        }
        setInterval(tick, 1000); tick();

        // ── Toast
        function toast(msg, type = 'info', dur = 2500) {
            const c = $('#toastBox');
            while (c.children.length >= 2) c.removeChild(c.firstChild);
            const t = document.createElement('div');
            t.className = `toast t-${type}`;
            t.textContent = msg;
            c.appendChild(t);
            requestAnimationFrame(() => requestAnimationFrame(() => t.classList.add('show')));
            setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, dur);
        }

        // ── Socket
        socket.on('connect', () => { $('#conn').dataset.s = 'ok'; t0 = Date.now(); });
        socket.on('disconnect', () => { $('#conn').dataset.s = 'off'; toast('Connection lost', 'err'); });
        socket.on('connect_error', () => { $('#conn').dataset.s = 'wait'; });

        // ── OBS Status
        socket.on('obsStatus', d => { $('#obsConn').dataset.s = d.connected ? 'ok' : 'off'; });

        // ── Audio backend
        const backendLabels = { voicemeeter: 'VM', native: 'APP', none: 'OFF' };
        socket.on('vmStatus', d => {
            const tag = $('#backendTag');
            const b = (d && d.backend) || 'unknown';
            tag.dataset.b = b;
            tag.textContent = backendLabels[b] || '?';
        });

        // ── Dim
        $('#dimBtn').onclick = () => { document.body.classList.toggle('dim'); haptic(8); };

        // ── Mode / Action Buttons
        function setMode(m) {
            mode = m;
            document.body.dataset.mode = m;
            // Clear any stale peek frame whenever the mode changes so
            // the hero never shows an out-of-date capture.
            if (previewVisible) hidePreview();

            $('#chTv').classList.toggle('idle', m === 'break');
            $('#chSp').classList.toggle('idle', m === 'game');

            const labels = { game: 'Live: Broadcast', break: 'Live: Spotify', unknown: 'Waiting...', switching: 'Switching...' };
            $('#statusTxt').textContent = labels[m] || '';

            // Update Hero Icon
            const icon = $('#heroIcon');
            if (m === 'game') {
                icon.innerHTML = '<rect x="2" y="7" width="20" height="15" rx="2" ry="2"></rect><polyline points="17 2 12 7 7 2"></polyline>';
            } else if (m === 'break') {
                icon.innerHTML = '<path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle>';
            } else {
                icon.innerHTML = '<circle cx="12" cy="12" r="10"></circle>';
            }
        }

        function infer(scene) { return scene === 'Live Übertragung' ? 'game' : scene && scene !== '—' ? 'break' : 'unknown'; }

        let pendingTarget = null;

        // Action buttons: tap → switch OBS scene + fade audio to that
        // scene's preset levels (not the user's current fader positions).
        // The user's live levels are still set on the server-side profile
        // store via the profile chips, so a later scene switch can fade
        // back to them — but the *action* itself is "go to game / break",
        // which always means a specific audio target.
        const sceneActionTargets = {
            game:  { tv:   0, sp: -60 },
            break: { tv: -60, sp:   0 },
        };
        $$('.action-btn').forEach(btn => btn.addEventListener('click', () => {
            if (mode === 'switching') return;
            const target = btn.dataset.mode;
            if (target === mode) return;

            haptic(20);
            setMode('switching');
            pendingTarget = target;
            const t = sceneActionTargets[target];
            if (!t) return;
            if (target === 'break') {
                socket.emit('PauseAction', { tvTarget: t.tv, spTarget: t.sp });
                toast('Switching to break', 'warn');
            } else {
                socket.emit('GameAction', { tvTarget: t.tv, spTarget: t.sp });
                toast('Switching to game', 'ok');
            }
        }));

        socket.on('currentScene', d => {
            $$('.scene-chip').forEach(b => b.classList.toggle('on', b.dataset.scene === d.sceneName));
            $('#heroText').textContent = d.sceneName;
            if (mode === 'switching') return;
            setMode(infer(d.sceneName));
        });

        socket.on('actionDone', target => {
            haptic([10, 30, 10]); toast('Done', 'ok', 1500);
            setMode(target || pendingTarget || 'unknown');
            pendingTarget = null;
        });

        socket.on('actionFailed', () => {
            setMode('unknown');
            pendingTarget = null;
        });

        setMode('unknown');

        // ── OBS preview (on-demand peek at the live feed) ─────────
        // Tap the dock's eye util-btn to capture ONE frame of
        // PREVIEW_SOURCE (default: the Live scene) — checks whether
        // the feed has resumed while the beamer shows break images.
        // No streaming: one request → one JPEG → the hero swaps from
        // the mode ring to a peek card. Tap again (or tap the image)
        // to refresh; the ✕ dismisses back to the ring.
        const heroSpace   = $('#heroSpace');
        const peekBtn     = $('#peekBtn');
        const previewImg  = $('#previewImg');
        const previewTs   = $('#previewTs');
        const previewAge  = $('#previewAge');
        const previewErr  = $('#previewErr');
        const previewClose = $('#previewClose');

        let previewObjectUrl = null;
        let previewCapturedAt = 0;
        let previewAgeTimer = null;

        // One token drives every visual: the hero swaps idle⇄card and
        // the dock button swaps eye⇄spinner + active highlight.
        function previewState(s) {
            heroSpace.dataset.preview = s;
            peekBtn.dataset.state = s;
            peekBtn.classList.toggle('active', s !== 'idle');
        }

        function updateAge() {
            if (!previewCapturedAt) return;
            const s = Math.max(0, Math.floor((Date.now() - previewCapturedAt) / 1000));
            let txt;
            if (s < 4)       txt = 'just now';
            else if (s < 60) txt = s + 's ago';
            else             txt = Math.floor(s / 60) + 'm ' + (s % 60) + 's ago';
            previewAge.textContent = '· ' + txt;
            // Amber once the frame is old enough that the match state
            // may have changed since capture — a nudge to re-peek.
            previewAge.classList.toggle('stale', s >= 15);
        }
        function startAgeTimer() { stopAgeTimer(); updateAge(); previewAgeTimer = setInterval(updateAge, 1000); }
        function stopAgeTimer() { if (previewAgeTimer) { clearInterval(previewAgeTimer); previewAgeTimer = null; } }

        function showPreviewFrame(buf) {
            const blob = new Blob([buf], { type: 'image/jpeg' });
            if (previewObjectUrl) URL.revokeObjectURL(previewObjectUrl);
            previewObjectUrl = URL.createObjectURL(blob);
            previewImg.src = previewObjectUrl;
            previewCapturedAt = Date.now();
            previewTs.textContent = new Date(previewCapturedAt).toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            previewVisible = true;
            previewState('live');
            startAgeTimer();
            haptic(8);
        }
        function hidePreview() {
            stopAgeTimer();
            previewCapturedAt = 0;
            previewVisible = false;
            if (previewObjectUrl) { URL.revokeObjectURL(previewObjectUrl); previewObjectUrl = null; }
            previewImg.src = '';
            previewAge.textContent = '';
            previewAge.classList.remove('stale');
            previewState('idle');
        }
        function requestPreview() {
            if ($('#obsConn').dataset.s !== 'ok') { toast('OBS not connected', 'err'); return; }
            if (heroSpace.dataset.preview === 'loading') return;   // ignore double-taps mid-capture
            haptic(10);
            previewState('loading');
            socket.emit('getPreview');
        }
        peekBtn.addEventListener('click', requestPreview);
        previewImg.addEventListener('click', requestPreview);
        previewClose.addEventListener('click', e => { e.stopPropagation(); haptic(8); hidePreview(); });

        socket.on('previewFrame', buf => showPreviewFrame(buf));
        socket.on('previewError', msg => {
            previewErr.textContent = msg || 'capture failed';
            previewState('error');
            stopAgeTimer();
            toast('Preview failed: ' + msg, 'err', 3000);
        });

        // ── Faders
        function updFill(id) {
            const el = $(`#${id}`), fill = $(`#${id === 'tvFader' ? 'tvFill' : 'spFill'}`);
            const mn = parseFloat(el.min), mx = parseFloat(el.max), v = parseFloat(el.value);
            fill.style.width = ((v - mn) / (mx - mn) * 100) + '%';
        }
        function updDb(id, val) {
            const el = $(`#${id}`), v = parseFloat(val);
            el.textContent = (v >= 0 ? '+' : '') + v.toFixed(1) + ' dB';
            el.classList.toggle('hot', v > 6);
        }

        [{ f: 'tvFader', d: 'tvDb', s: 3, m: 'tvMute', p: 'tvPresets' }, { f: 'spFader', d: 'spDb', s: 4, m: 'spMute', p: 'spPresets' }].forEach(({ f, d, s, m, p }) => {
            const el = $(`#${f}`);
            el.addEventListener('input', () => { socket.emit('setVolume', { stripIndex: s, volume: parseFloat(el.value) }); updDb(d, el.value); updFill(f); });
            let lt = 0;
            el.addEventListener('touchend', () => { const n = Date.now(); if (n - lt < 300) { haptic(15); cycleFaderPresets(f, d, s); } lt = n; });
            updFill(f);

            // Mute toggle
            $(`#${m}`).addEventListener('click', () => { haptic(10); socket.emit('toggleMute', { stripIndex: s }); });
        });



        // ── Mute state
        socket.on('muteState', d => {
            const btn = d.stripIndex === 3 ? $('#tvMute') : $('#spMute');
            btn.classList.toggle('muted', d.muted);
        });

        // ── Fader state sync (from Voicemeeter on connect)
        socket.on('faderState', d => {
            const faderId = d.stripIndex === 3 ? 'tvFader' : 'spFader';
            const dbId = d.stripIndex === 3 ? 'tvDb' : 'spDb';
            const el = $(`#${faderId}`);
            el.value = d.gain;
            updDb(dbId, d.gain);
            updFill(faderId);
        });

        // ── Fader presets (cycle on double-tap)
        const faderPresets = {
            tvFader: [-1.2, -3, -6, -10, 0],
            spFader: [-3.5, -6, -10, -20, 0]
        };
        const faderPresetIdx = { tvFader: 0, spFader: 0 };

        function cycleFaderPresets(faderId, dbId, stripIndex) {
            const presets = faderPresets[faderId];
            const idx = (faderPresetIdx[faderId] + 1) % presets.length;
            faderPresetIdx[faderId] = idx;
            const val = presets[idx];
            const el = $(`#${faderId}`);
            el.value = val;
            socket.emit('setVolume', { stripIndex, volume: val });
            updDb(dbId, val); updFill(faderId);
            toast(`${val >= 0 ? '+' : ''}${val.toFixed(1)} dB`, 'info', 800);
        }

        // ── Audio Profiles
        let profiles = {};

        socket.on('profileList', p => { profiles = p; });
        socket.emit('getProfiles');

        socket.on('profileSaved', d => {
            profiles[d.name] = d.gains;
            toast(`Profile "${d.name}" saved`, 'ok', 1500);
        });

        socket.on('profileLoaded', d => {
            if (d.gains[3] !== undefined) {
                $('#tvFader').value = d.gains[3]; updDb('tvDb', d.gains[3]); updFill('tvFader');
            }
            if (d.gains[4] !== undefined) {
                $('#spFader').value = d.gains[4]; updDb('spDb', d.gains[4]); updFill('spFader');
            }
        });

        // Save current levels as a profile
        $('#saveProfileBtn').addEventListener('click', () => {
            const name = prompt('Profile name:');
            if (!name) return;
            haptic(10);
            socket.emit('saveProfile', { name });
        });

        // Load profile on tap
        $$('.profile-chip').forEach(btn => btn.addEventListener('click', () => {
            haptic(10);
            socket.emit('loadProfile', { name: btn.dataset.profile });
            toast(`Loading ${btn.dataset.profile} profile`, 'info', 1000);
        }));

        // ── Scenes
        $$('.scene-chip').forEach(b => b.addEventListener('click', () => { haptic(10); socket.emit('transition', { sceneName: b.dataset.scene }); }));

        // ── Drawer
        function openDrawer() { $('#drawer').classList.add('open'); $('#drawerBg').classList.add('show'); drawerOpen = true; unread = 0; updBadge(); }
        function closeDrawer() { $('#drawer').classList.remove('open'); $('#drawerBg').classList.remove('show'); drawerOpen = false; }
        function updBadge() { const b = $('#badge'); if (unread > 0 && !drawerOpen) { b.textContent = unread; b.hidden = false; } else b.hidden = true; }
        $('#logBtn').onclick = () => { haptic(8); drawerOpen ? closeDrawer() : openDrawer(); };
        $('#drawerBg').onclick = closeDrawer;
        $('#clearLog').onclick = () => { $('#log').innerHTML = ''; };

        let sy = 0, cy = 0;
        const grip = $('#drawerGrip');
        grip.addEventListener('touchstart', e => { sy = e.touches[0].clientY; $('#drawer').style.transition = 'none'; }, { passive: true });
        grip.addEventListener('touchmove', e => { cy = e.touches[0].clientY; const d = cy - sy; if (d > 0) $('#drawer').style.transform = `translateY(${d}px)`; }, { passive: true });
        grip.addEventListener('touchend', () => { $('#drawer').style.transition = ''; $('#drawer').style.transform = ''; if (cy - sy > 80) closeDrawer(); sy = 0; cy = 0; });

        socket.on('terminalOutput', data => {
            const line = document.createElement('div');
            line.className = 'log-line';
            const time = new Date().toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            let cls = '';
            if (data.includes('Failed') || data.includes('failed')) cls = 'l-err';
            else if (data.includes('completed') || data.includes('Connected')) cls = 'l-ok';
            else if (data.includes('Transitioned') || data.includes('Switched') || data.includes('Faded')) cls = 'l-act';
            line.innerHTML = `<span class="log-t">${time}</span> <span class="${cls}">${data}</span>`;
            const log = $('#log');
            log.appendChild(line);
            while (log.children.length > 200) log.removeChild(log.firstChild);
            log.scrollTop = log.scrollHeight;
            if (!drawerOpen) { unread++; updBadge(); }
        });
    })();
    </script>
    <script src="app.js"></script>
</body>
</html>
