<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voicemeeter Control</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        button, input[type="range"] {
            margin: 5px;
            padding: 10px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <h1>Voicemeeter and OBS Control</h1>

    <h2>OBS Scenes</h2>
    <button id="szene2Button">Switch to Szene 2</button>
    <button id="spotiQButton">Switch to Ard</button>
    <button id="szene3Button">Switch to Szene 3</button>

    <h2>Voicemeeter Inputs</h2>
    <h3>Main Input (Voicemeeter VAIO)</h3>
    <button ondblclick="setVolume(3, 0)">Set to 0 dB</button>
    <input type="range" min="-60" max="12" step="0.1" value="0" ondblclick="setVolume(3, 0)" oninput="setVolume(3, this.value)">

    <h3>Spotify Input (Voicemeeter AUX)</h3>
    <button ondblclick="setVolume(0, 0)">Set to 0 dB</button>
    <input type="range" min="-60" max="12" step="0.1" value="0" ondblclick="setVolume(4, 0)" oninput="setVolume(4, this.value)">

    <script>
        const socket = io();

        document.getElementById('szene2Button').addEventListener('click', () => {
            socket.emit('transition', { sceneName: 'Szene 2' });
        });

        document.getElementById('spotiQButton').addEventListener('click', () => {
            socket.emit('transition', { sceneName: 'Ard' });
        });

        document.getElementById('szene3Button').addEventListener('click', () => {
            socket.emit('transition', { sceneName: 'Szene 3' });
        });

        function setVolume(stripIndex, volume) {
            socket.emit('setVolume', { stripIndex, volume });
        }
    </script>
</body>
</html>
