<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voicemeeter and OBS Control</title>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Euros Studio</h1>
    </header>
    
    <main>
        <div class="container">
            <h2>OBS Scenes</h2>
            <button id="szene2Button">Switch to Szene 2</button>
            <button id="spotiQButton">Switch to Ard</button>
            <button id="szene3Button">Switch to Szene 3</button>
            <h3>Current Scene: <span id="currentScene">Loading...</span></h3>
        </div>

        <div class="container">
            <h2>Voicemeeter Inputs</h2>
            <h3>Main Input (Voicemeeter VAIO)</h3>
            <button ondblclick="setVolume(3, 0); resetSlider('mainInputSlider', 0)">Set to 0 dB</button>
            <input id="mainInputSlider" type="range" min="-60" max="12" step="0.1" value="0" ondblclick="setVolume(3, 0); resetSlider('mainInputSlider', 0)" oninput="updateVolume(3, this.value)">
        
            <h3>Spotify Input (Voicemeeter AUX)</h3>
            <button ondblclick="setVolume(4, 0); resetSlider('spotifyInputSlider', 0)">Set to 0 dB</button>
            <input id="spotifyInputSlider" type="range" min="-60" max="12" step="0.1" value="0" ondblclick="setVolume(4, 0); resetSlider('spotifyInputSlider', 0)" oninput="updateVolume(4, this.value)">
        </div>

        <div class="container">
            <h2>Automated Action</h2>
            <button id="automatedActionButton">Execute Automated Action</button>
        </div>

        <div class="container">
            <h2>Terminal Output</h2>
            <div id="terminalOutput" class="output-box"></div>
        </div>

        <div class="container">
            <button id="darkModeToggle">Toggle Dark Mode</button>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 Jannik. All rights reserved.</p>
    </footer>

    <script>
        const socket = io();

        document.getElementById('szene2Button').addEventListener('click', () => {
            socket.emit('transition', { sceneName: 'Szene 2' });
        });

        document.getElementById('spotiQButton').addEventListener('click', () => {
            socket.emit('transition', { sceneName: 'Ard' });
        });

        document.getElementById('szene3Button').addEventListener('click', () => {
            socket.emit('transition', { sceneName: 'Szene 3' });
        });

        function setVolume(stripIndex, volume) {
            socket.emit('setVolume', { stripIndex, volume });
        }

        function updateVolume(stripIndex, value) {
            setVolume(stripIndex, value);
        }

        function resetSlider(sliderId, value) {
            document.getElementById(sliderId).value = value;
        }

        // Automated Action
        document.getElementById('automatedActionButton').addEventListener('click', () => {
            socket.emit('automatedAction', {
                actionName: 'exampleAction',
                obsScene: 'Ard',
                spotifyVolume: -40,
                mainVolume: 0
            });
        });

        // Listen for terminal output
        socket.on('terminalOutput', data => {
            const terminalOutput = document.getElementById('terminalOutput');
            terminalOutput.innerHTML += data + '<br>';
            terminalOutput.scrollTop = terminalOutput.scrollHeight;
        });

        // Listen for current scene updates
        socket.on('currentScene', data => {
            document.getElementById('currentScene').textContent = data.sceneName;
        });

        // Dark Mode Toggle
        document.getElementById('darkModeToggle').addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
        });
    </script>
</body>
</html>
