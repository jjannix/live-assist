<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBS WebSocket Control</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        button, input[type="range"] {
            margin: 5px;
            padding: 10px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <h1>OBS Studio Control</h1>
    <button id="szene2Button">Switch to Szene 2</button>
    <button id="spotiQButton">Switch to SpotiQ</button>
    <button id="szene3Button">Switch to Szene 3</button>

    <h2>Audio Controls</h2>
    <div>
        <h3>Desktop Audio</h3>
        <button onclick="mute('Desktop-Audio')">Mute</button>
        <button onclick="unmute('Desktop-Audio')">Unmute</button>
        <input type="range" min="0" max="1" step="0.01" value="1" oninput="setVolume('Desktop-Audio', this.value)">
    </div>

    <div>
        <h3>Microphone Audio</h3>
        <button onclick="mute('Mikrofon-/AUX-Audio')">Mute</button>
        <button onclick="unmute('Mikrofon-/AUX-Audio')">Unmute</button>
        <input type="range" min="0" max="1" step="0.01" value="1" oninput="setVolume('Mikrofon-/AUX-Audio', this.value)">
    </div>

    <script>
        const socket = io();

        document.getElementById('szene2Button').addEventListener('click', () => {
            socket.emit('transition', { sceneName: 'Szene 2' });
        });

        document.getElementById('spotiQButton').addEventListener('click', () => {
            socket.emit('transition', { sceneName: 'SpotiQ' });
        });

        document.getElementById('szene3Button').addEventListener('click', () => {
            socket.emit('transition', { sceneName: 'Szene 3' });
        });

        function mute(inputName) {
            socket.emit('mute', { inputName });
        }

        function unmute(inputName) {
            socket.emit('unmute', { inputName });
        }

        function setVolume(inputName, volume) {
            socket.emit('setVolume', { inputName, volume: parseFloat(volume) });
        }
    </script>
</body>
</html>
