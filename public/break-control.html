<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <title>Break · Live Assist</title>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="/style.css">
    <style>
        /* Operator page: compact editor for break.html. Sits on top of style.css
           and reuses .section / .kv / .chip / .back-btn / .topbar. */
        body { overflow-y: auto; }
        .main { padding-bottom: 40px; }

        .b-hero {
            text-align: center; padding: 12px 20px 4px;
        }
        .b-clock {
            font-size: 56px; font-weight: 800; letter-spacing: -1px;
            font-variant-numeric: tabular-nums; color: var(--text);
            line-height: 1; margin: 4px 0;
        }
        .b-clock.done { color: var(--amber); }
        .b-clock-cap { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--text-3); }

        .b-timer-btns { display: grid; grid-template-columns: 2fr 2fr 1.5fr; gap: 8px; padding: 0 20px 8px; }
        .b-timer-btns .chip { padding: 16px 0; font-size: 14px; }
        .b-adj { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; padding: 0 20px; }
        .b-adj .chip { padding: 12px 0; font-size: 13px; }

        /* Score steppers */
        .score-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 20px; }
        .score-card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 14px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .score-card input {
            width: 100%; text-align: center;
            background: transparent; border: none; outline: none;
            color: var(--text); font-family: inherit; font-size: 13px; font-weight: 600;
            border-bottom: 1px solid var(--border); padding: 4px 0;
        }
        .score-card input:focus { border-bottom-color: var(--border-hl); }
        .score-val { font-size: 40px; font-weight: 800; font-variant-numeric: tabular-nums; color: var(--text); line-height: 1; }
        .score-steppers { display: flex; gap: 8px; width: 100%; }
        .score-steppers .chip { flex: 1; padding: 12px 0; font-size: 18px; font-weight: 700; }

        .field { padding: 11px 0; border-bottom: 1px solid var(--border); }
        .field:last-child { border-bottom: none; }
        .field input {
            width: 100%; background: var(--card-up); border: 1px solid var(--border); border-radius: 12px;
            padding: 12px 14px; color: var(--text); font-family: inherit; font-size: 14px;
        }
        .field input:focus { outline: none; border-color: var(--border-hl); }
        .field-lbl { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-3); margin-bottom: 6px; }

        /* Slide rotation controls */
        .slide-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .slide-toggle {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 14px; border-radius: 12px;
            background: var(--card-up); border: 1px solid var(--border);
            font-size: 13px; font-weight: 600; color: var(--text-2);
            cursor: pointer; transition: all 0.15s;
        }
        .slide-toggle.on { color: var(--text); border-color: var(--border-hl); background: var(--card); }
        .slide-toggle .pin {
            width: 22px; height: 22px; border-radius: 11px;
            border: 1px solid var(--border); background: transparent;
            color: var(--text-3); display: flex; align-items: center; justify-content: center;
            font-size: 11px; cursor: pointer; margin-left: 8px;
        }
        .slide-toggle .pin.on { background: var(--accent); border-color: var(--accent); color: #000; }
        .dwell-row { display: flex; gap: 8px; margin-top: 10px; }
        .dwell-row .chip { flex: 1; padding: 12px 0; font-size: 13px; }

        /* Sponsor upload */
        .ad-upload {
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            padding: 16px; border: 1px dashed var(--border-hl); border-radius: 14px; margin: 8px 0;
        }
        .ad-preview {
            width: 100%; max-height: 120px; object-fit: contain; border-radius: 8px;
            background: var(--card-up); display: none;
        }
        .ad-preview.show { display: block; }
        .ad-pick { padding: 12px 24px; border-radius: 100px; border: none; background: var(--accent); color: #000; font-weight: 700; font-size: 13px; cursor: pointer; }
        .ad-pick:active { transform: scale(0.96); }
        .ad-file { display: none; }
    </style>
</head>
<body>

    <header class="topbar">
        <button class="back-btn" onclick="location.href='/'" aria-label="Back to controller">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <span class="logo">BREAK</span>
        <div class="status-pill">
            <span class="conn-dot" id="conn" data-s="wait"></span>
            <span class="status-txt" id="connTxt">connecting</span>
        </div>
    </header>

    <main class="main">

        <!-- Live clock mirror -->
        <div class="b-hero">
            <div class="b-clock" id="liveClock">15:00</div>
            <div class="b-clock-cap" id="liveCap">bis Anpfiff</div>
        </div>
        <div class="b-timer-btns">
            <button class="chip" id="tStart">▶ Start</button>
            <button class="chip" id="tPause">❚❚ Pause</button>
            <button class="chip" id="tReset">Reset</button>
        </div>
        <div class="b-adj">
            <button class="chip" data-adj="-60">−1m</button>
            <button class="chip" data-adj="-10">−10s</button>
            <button class="chip" data-adj="10">+10s</button>
            <button class="chip" data-adj="60">+1m</button>
        </div>

        <div class="section" style="margin-top:16px">
            <div class="section-title">Score</div>
            <div class="score-grid">
                <div class="score-card">
                    <input id="homeName" type="text" placeholder="Home" maxlength="24">
                    <div class="score-val" id="homeScore">0</div>
                    <div class="score-steppers">
                        <button class="chip" data-side="home" data-delta="-1">−</button>
                        <button class="chip" data-side="home" data-delta="1">+</button>
                    </div>
                </div>
                <div class="score-card">
                    <input id="awayName" type="text" placeholder="Away" maxlength="24">
                    <div class="score-val" id="awayScore">0</div>
                    <div class="score-steppers">
                        <button class="chip" data-side="away" data-delta="-1">−</button>
                        <button class="chip" data-side="away" data-delta="1">+</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">Match clock</div>
            <div class="field">
                <div class="field-lbl">Label (HT / FT / …)</div>
                <input id="matchLbl" type="text" maxlength="8" placeholder="HT">
            </div>
            <div class="field">
                <div class="field-lbl">Frozen time (e.g. 45:00)</div>
                <input id="matchVal" type="text" maxlength="12" placeholder="45:00">
            </div>
        </div>

        <div class="section">
            <div class="section-title">Halftime length (minutes)</div>
            <div class="b-adj" style="padding:0;">
                <button class="chip" data-dur="10">10</button>
                <button class="chip" data-dur="15">15</button>
                <button class="chip" data-dur="20">20</button>
                <button class="chip" data-dur="25">25</button>
            </div>
        </div>

        <div class="section">
            <div class="section-title">Display</div>
            <div class="field">
                <div class="field-lbl">Title</div>
                <input id="title" type="text" maxlength="40" placeholder="HALBZEIT">
            </div>
            <div class="field">
                <div class="field-lbl">Message (optional)</div>
                <input id="message" type="text" maxlength="120" placeholder="Schau gleich weiter...">
            </div>
        </div>

        <!-- Slide rotation -->
        <div class="section">
            <div class="section-title">Slides (rotation)</div>
            <div class="slide-grid" id="slideGrid"></div>
            <div class="dwell-row">
                <button class="chip" data-dwell="8000">8s</button>
                <button class="chip" data-dwell="12000">12s</button>
                <button class="chip" data-dwell="16000">16s</button>
                <button class="chip" data-dwell="20000">20s</button>
            </div>
        </div>

        <!-- Sponsor ad -->
        <div class="section">
            <div class="section-title">Sponsor</div>
            <div class="ad-upload">
                <img class="ad-preview" id="adPreview" alt="">
                <input class="ad-file" id="adFile" type="file" accept="image/png,image/jpeg,image/webp,image/svg+xml">
                <button class="ad-pick" id="adPick" type="button">Logo hochladen</button>
            </div>
            <div class="field">
                <div class="field-lbl">Organisation / Name</div>
                <input id="adOrgName" type="text" maxlength="48" placeholder="z.B. TuS Musterhausen">
            </div>
            <div class="field">
                <div class="field-lbl">Tagline (optional)</div>
                <input id="adTagline" type="text" maxlength="80" placeholder="Dein Verein im Herzen der Stadt">
            </div>
            <div class="field">
                <div class="field-lbl">Link für QR-Code (optional)</div>
                <input id="adUrl" type="text" maxlength="200" placeholder="https://...">
            </div>
        </div>

        <!-- Predictions -->
        <div class="section">
            <div class="section-title">Tipps</div>
            <div class="field">
                <div class="field-lbl">Frage</div>
                <input id="predQuestion" type="text" maxlength="80" placeholder="Wie steht es am Ende?">
            </div>
            <div style="padding-top:8px">
                <button class="chip" id="clearPreds" style="width:100%;padding:14px 0;font-size:14px">Tipps zurücksetzen</button>
            </div>
        </div>

    </main>

    <div class="toast-box" id="toastBox"></div>

    <script>
    (() => {
        'use strict';
        const $ = s => document.querySelector(s);
        const socket = io();

        let state = {};
        let typingTimer = null;

        function pad(n) { return String(n).padStart(2, '0'); }
        function fmt(sec) {
            sec = Math.max(0, Math.floor(sec));
            const m = Math.floor(sec / 60), s = sec % 60;
            return pad(m) + ':' + pad(s);
        }

        // Local tick so the on-screen clock counts down smoothly between
        // server broadcasts (server is still the authority — see break-state.js).
        let endsAt = null, running = false, remaining = 0;
        setInterval(() => {
            if (!running || !endsAt) return;
            const rem = Math.max(0, Math.round((endsAt - Date.now()) / 1000));
            const el = $('#liveClock');
            el.textContent = fmt(rem);
            el.classList.toggle('done', rem <= 0);
            $('#liveCap').textContent = rem <= 0 ? 'Anpfiff' : 'bis Anpfiff';
        }, 250);

        function render(s) {
            state = s;
            const t = s.timer || {};
            running = !!t.running;
            endsAt = t.endsAt;
            remaining = t.remainingSec || 0;
            const el = $('#liveClock');
            el.textContent = fmt(running && endsAt ? Math.max(0, Math.round((endsAt - Date.now())/1000)) : remaining);
            el.classList.toggle('done', remaining <= 0 && !running);
            $('#liveCap').textContent = running ? 'bis Anpfiff' : (remaining <= 0 ? 'Anpfiff' : 'pausiert');

            // Sync fields — but never clobber what the operator is actively typing.
            syncUnlessFocused('#homeName', (s.home || {}).name || '');
            syncUnlessFocused('#awayName', (s.away || {}).name || '');
            $('#homeScore').textContent = (s.home || {}).score || 0;
            $('#awayScore').textContent = (s.away || {}).score || 0;
            syncUnlessFocused('#matchLbl', (s.matchClock || {}).label || '');
            syncUnlessFocused('#matchVal', (s.matchClock || {}).display || '');
            syncUnlessFocused('#title', s.title || '');
            syncUnlessFocused('#message', s.message || '');
            renderRotation(s.rotation);
            renderAd(s.ad);
            renderPredictions(s.predictions);
        }
        function renderPredictions(p) {
            p = p || {};
            syncUnlessFocused('#predQuestion', p.question || '');
            const total = p.total || 0;
            const clr = $('#clearPreds');
            if (clr) clr.textContent = total > 0 ? (total + ' Tipps zurücksetzen') : 'Tipps zurücksetzen';
        }
        function syncUnlessFocused(sel, val) {
            const el = $(sel); if (document.activeElement !== el) el.value = val;
        }

        socket.on('connect',      () => { $('#conn').dataset.s = 'ok';  $('#connTxt').textContent = 'live'; });
        socket.on('disconnect',   () => { $('#conn').dataset.s = 'off'; $('#connTxt').textContent = 'offline'; });
        socket.on('connect_error',() => { $('#conn').dataset.s = 'wait'; $('#connTxt').textContent = 'reconnecting'; });
        socket.on('breakState', render);
        socket.emit('breakStateGet');

        // ── Emit helpers ──
        const patch = partial => socket.emit('breakUpdate', partial);

        // Timer buttons
        $('#tStart').onclick  = () => socket.emit('breakTimer', { action: 'start' });
        $('#tPause').onclick  = () => socket.emit('breakTimer', { action: 'pause' });
        $('#tReset').onclick  = () => { socket.emit('breakTimer', { action: 'reset' }); toast('Timer reset', 'info', 1000); };
        document.querySelectorAll('[data-adj]').forEach(b => b.onclick = () => socket.emit('breakTimer', { action: 'adjust', deltaSec: parseInt(b.dataset.adj, 10) }));
        document.querySelectorAll('[data-dur]').forEach(b => b.onclick = () => { socket.emit('breakTimer', { action: 'duration', sec: parseInt(b.dataset.dur, 10) * 60 }); toast('Halftime: ' + b.dataset.dur + ' min', 'info', 1000); });

        // Score steppers
        document.querySelectorAll('[data-side]').forEach(b => b.onclick = () => socket.emit('breakScore', { side: b.dataset.side, delta: parseInt(b.dataset.delta, 10) }));

        // Free-text fields — debounce so we don't spam the socket per keystroke
        function debounce(sel, build) {
            const el = $(sel);
            el.addEventListener('input', () => {
                clearTimeout(typingTimer);
                typingTimer = setTimeout(() => patch(build(el.value)), 350);
            });
        }
        debounce('#homeName', v => ({ home: { name: v } }));
        debounce('#awayName', v => ({ away: { name: v } }));
        debounce('#matchLbl', v => ({ matchClock: { label: v } }));
        debounce('#matchVal', v => ({ matchClock: { display: v } }));
        debounce('#title',    v => ({ title: v }));
        debounce('#message',  v => ({ message: v }));

        // ── Slide rotation ──
        const SLIDE_LABELS = { clock: 'Uhr', radial: 'Ring', score: 'Stand', message: 'Durchsage', ad: 'Sponsor', brand: 'Brand', particles: 'Partikel', equalizer: 'Equalizer', stats: 'Stats', ticker: 'Ticker', splitflap: 'Klapptafel', neon: 'Neon', wave: 'Welle', swiss: 'Swiss', audiolizer: 'Audiolizer', flowfield: 'Flowfield', predictions: 'Tipps' };
        let rotation = {};
        function renderRotation(r) {
            rotation = r || {};
            const active = r.active || {};
            const grid = $('#slideGrid');
            grid.innerHTML = '';
            Object.keys(SLIDE_LABELS).forEach(k => {
                const row = document.createElement('div');
                row.className = 'slide-toggle' + (active[k] ? ' on' : '');
                row.innerHTML = '<span>' + SLIDE_LABELS[k] + '</span>';
                const pin = document.createElement('button');
                pin.className = 'pin' + (r.pinned === k ? ' on' : '');
                pin.textContent = r.pinned === k ? '✓' : 'pin';
                pin.onclick = e => {
                    e.stopPropagation();
                    const next = r.pinned === k ? null : k;
                    socket.emit('breakRotation', { pinned: next });
                };
                row.appendChild(pin);
                row.onclick = () => socket.emit('breakRotation', { active: { [k]: !active[k] } });
                grid.appendChild(row);
            });
        }
        document.querySelectorAll('[data-dwell]').forEach(b => b.onclick = () => {
            socket.emit('breakRotation', { dwellMs: parseInt(b.dataset.dwell, 10) });
            toast('Dwell: ' + (parseInt(b.dataset.dwell,10)/1000) + 's', 'info', 1000);
        });

        // ── Sponsor ──
        function renderAd(ad) {
            ad = ad || {};
            syncUnlessFocused('#adOrgName', ad.orgName || '');
            syncUnlessFocused('#adTagline', ad.tagline || '');
            syncUnlessFocused('#adUrl', ad.url || '');
            const prev = $('#adPreview');
            if (ad.logoFile) { prev.src = '/break-ads/' + ad.logoFile + '?t=' + Date.now(); prev.classList.add('show'); }
            else { prev.classList.remove('show'); prev.src = ''; }
        }
        $('#adPick').onclick = () => $('#adFile').click();
        $('#adFile').onchange = async e => {
            const f = e.target.files[0]; if (!f) return;
            if (f.size > 8 * 1024 * 1024) { toast('Datei zu gross (max 8 MB)', 'err'); return; }
            const reader = new FileReader();
            reader.onload = async () => {
                toast('Lade Logo...', 'info', 1500);
                try {
                    const r = await fetch('/api/break-ad/upload', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ image: reader.result }),
                    });
                    const j = await r.json();
                    if (!r.ok || !j.ok) throw new Error(j.error || 'Upload fehlgeschlagen');
                    toast('Logo gespeichert', 'ok');
                } catch (err) { toast(err.message, 'err'); }
            };
            reader.readAsDataURL(f);
        };
        debounce('#adOrgName', v => ({ ad: { orgName: v } }));
        debounce('#adTagline', v => ({ ad: { tagline: v } }));
        debounce('#adUrl',     v => ({ ad: { url: v } }));
        debounce('#predQuestion', v => ({ predictions: { question: v } }));
        $('#clearPreds').onclick = () => { socket.emit('breakPredictionsClear'); toast('Tipps zurückgesetzt', 'info', 1000); };

        // Toast (reused from controller)
        function toast(msg, type = 'info', dur = 2000) {
            const c = $('#toastBox');
            while (c.children.length >= 2) c.removeChild(c.firstChild);
            const t = document.createElement('div');
            t.className = `toast t-${type}`; t.textContent = msg;
            c.appendChild(t);
            requestAnimationFrame(() => requestAnimationFrame(() => t.classList.add('show')));
            setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, dur);
        }
    })();
    </script>
</body>
</html>
